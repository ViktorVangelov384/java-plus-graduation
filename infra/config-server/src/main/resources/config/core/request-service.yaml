server:
  port: 0

spring:
  application:
    name: request-service
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: core_requests
  sql:
    init:
      mode: always
  http:
    logging:
      include-headers: true
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/maindb
    username: user
    password: user

logging:
  level:
    org.springframework.cloud.config: DEBUG
    org.springframework.cloud.commons: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.client.discovery: DEBUG

api:
  log:
    stacktrace: true