spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/analyzer_db
    username: user
    password: user
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: stats_analyzer
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

kafka:
  bootstrap:
    servers: localhost:9092
  consumer:
    poll:
      timeout: 100
  topics:
    stats-user-action-v1: stats.user-actions.v1
    stats-events-similarity-v1: stats.events-similarity.v1
    stats-events-v1: stats.events.v1

grpc:
  server:
    port: 0

eureka:
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"
    metadata-map:
      gRPC_port: ${grpc.server.port}
      management.port: ${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud: DEBUG

