spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: request_route_event
          uri: lb://request-service
          predicates:
            - Path=/users/*/events/*/requests/**
        - id: request_route_user
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**
        - id: user_route_all
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
        - id: user_route_root
          uri: lb://user-service
          predicates:
            - Path=/admin/users
        - id: event_route_user
          uri: lb://event-service
          predicates:
            - Path=/users/*/events/**
        - id: event_route_admin
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**
        - id: event_route_public
          uri: lb://event-service
          predicates:
            - Path=/events/**
        - id: category_route_admin
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**
        - id: category_route_public
          uri: lb://event-service
          predicates:
            - Path=/categories/**
        - id: compilation_route_admin
          uri: lb://event-service
          predicates:
            - Path=/admin/compilations/**
        - id: compilation_route_public
          uri: lb://event-service
          predicates:
            - Path=/compilations/**
        - id: stats_route
          uri: lb://stats-server
          predicates:
            - Path=/stats/**
        - id: hit_route
          uri: lb://stats-server
          predicates:
            - Path=/hit/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/